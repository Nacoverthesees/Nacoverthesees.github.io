<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Elegy Of Blade</title>
	<link rel="stylesheet" href="style.css">
	<link rel="icon" href="images/pagelogo.png" type="image/png">
</head>

<body>

<header>
<nav class="navbar" aria-label="Main Navigation">
	<ul class="nav-inner">
	<li><button class="nav-item" data-page="0">Home</button></li>
	<li><button class="nav-item" data-page="1">Characters</button></li>
	<li><button class="nav-item" data-page="2">Features</button></li>
	<li><button class="nav-item" data-page="3">Updates</button></li>
	</ul>
</nav>
</header>

<main>

<!-- HOME -->
<section id="page0" class="section">
<video id="bgVideo" src="images/bgmeme.mp4" autoplay muted loop playsinline></video>

<h1 class="visually-hidden">Elegy of Blade</h1>

<img id="logo" src="images/logo.png" alt="Game logo">

<button id="playBtn" class="icon-btn" aria-label="Play trailer">
    <img src="images/play.png" alt="">
</button>
</section>

<!-- CHARACTERS -->
<section id="page1" class="section">
<h2>Characters</h2>

<div class="gallery">
	<div class="character">
	<img src="images/card1.png" alt="Main character">
	<p>Main Characte:kiwi catr</p>
	</div>

	<div class="character">
	<img src="images/card2.png" alt="Warrior character">
	<p>Mage:Thinker dog</p>
	</div>

	<div class="character">
	<img src="images/card3.png" alt="Mage character">
	<p>Warrior: Flashlight man</p>
	</div>

	<div class="character">
	<img src="images/card4.png" alt="Assassin character">
	<p>Assassin:The Head Over Walker</p>
	</div>

	<div class="character">
	<img src="images/card5.png" alt="Boss character">
	<p>Boss: Blue Helper</p>
	</div>
</div>
</section>

<!-- FEATURES -->
<section id="page2" class="section">
	<h2>Features</h2>
	<p>Gameplay systems, combat design, and AI interaction are currently in development.</p>
</section>

<!-- UPDATES -->
<section id="page3" class="section">
	<h2>Updates</h2>
	<p>Latest news and development logs will appear here.</p>
</section>

</main>

<!-- MODAL -->
<div id="modal" role="dialog" aria-modal="true">
	<button id="closeBtn" class="icon-btn" aria-label="Close video">
    <img src="images/close.png" alt="">
	</button>
	
	<video id="modalVideo" src="images/stonememe.mp4" controls></video>
</div>

<script src="LnA.js"></script>
</body>
</html>
